name: Aplicar layout de Sistemas

on:
  push:
    branches: [main]
    paths:
      - css/sistemas.css
      - js/sistemas.js
      - scripts/apply-systems-layout.py
      - .github/workflows/systems-layout.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-sistemas:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar o script de migração
        run: |
          python3 - <<'PY'
          import ast
          from pathlib import Path
          ast.parse(Path('scripts/apply-systems-layout.py').read_text(encoding='utf-8'))
          PY

      - name: Aplicar layout compartilhado
        run: python3 scripts/apply-systems-layout.py

      - name: Validar o JavaScript de Sistemas
        run: node --check js/sistemas.js

      - name: Confirmar carregamento dos recursos
        run: |
          grep -R --include='*.html' -L '../css/sistemas.css' sistemas && exit 1 || true
          grep -R --include='*.html' -L '../js/sistemas.js' sistemas && exit 1 || true

      - name: Registrar alterações
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "Nenhuma alteração adicional foi necessária."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sistemas
          git commit -m "Aplica layout responsivo às páginas de Sistemas"
          git push
