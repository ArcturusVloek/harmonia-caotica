name: Atualizar versões da interface

on:
  push:
    branches: [main]
    paths:
      - scripts/bump-interface-assets.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-referencias:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Atualizar versões dos recursos
        run: python3 scripts/bump-interface-assets.py

      - name: Registrar alterações
        run: |
          if git diff --quiet; then
            echo "As referências já estão atualizadas."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html' '**/*.html'
          git commit -m "Atualiza cache da interface consolidada"
          git push
