name: Aplicar padrão editorial

on:
  push:
    branches: [main]
    paths:
      - scripts/apply-editorial-upgrade.py
      - scripts/apply-layout-audit.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-site:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar os migradores
        run: |
          python3 - <<'PY'
          import ast
          from pathlib import Path
          for path in (
              'scripts/apply-editorial-upgrade.py',
              'scripts/apply-layout-audit.py',
          ):
              ast.parse(Path(path).read_text(encoding='utf-8'))
          PY

      - name: Aplicar estrutura editorial
        run: python3 scripts/apply-editorial-upgrade.py

      - name: Aplicar arquitetura responsiva
        run: python3 scripts/apply-layout-audit.py

      - name: Validar o JavaScript compartilhado
        run: |
          node --check js/editorial.js
          node --check js/editorial-core.js
          node --check js/device-mode.js
          node --check js/atlas-novo.js

      - name: Verificar estilos embutidos nas páginas internas
        run: |
          if grep -R --include='*.html' -n '<style>' divindades territorios mundo sistemas; then
            echo 'Ainda existem blocos de estilo embutidos.'
            exit 1
          fi

      - name: Limpar arquivos temporários
        run: find scripts -type d -name '__pycache__' -prune -exec rm -rf {} +

      - name: Registrar alterações
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "Nenhuma alteração adicional foi necessária."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Atualiza recursos editoriais e responsivos"
          git push
