            <meta name="description" content="Regras oficiais de Dano, Mitigação, Ferimentos, Condições, Derrota e destruição em Harmonia Caótica.">
            <title>Dano, Ferimentos, Condições e Derrota — Harmonia Caótica</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap">
