name: Publicar Bloco 12

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publicar-bloco-12.yml

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publicar e integrar o Bloco 12
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, content):
              Path(path).parent.mkdir(parents=True, exist_ok=True)
              Path(path).write_text(content, encoding='utf-8')

          def insert_after(path, marker, addition, unique):
              text = read(path)
              if unique in text:
                  return
              if marker not in text:
                  raise RuntimeError(f'Marcador não encontrado em {path}: {marker[:80]}')
              write(path, text.replace(marker, marker + addition, 1))

          def insert_before(path, marker, addition, unique):
              text = read(path)
              if unique in text:
                  return
              if marker not in text:
                  raise RuntimeError(f'Marcador não encontrado em {path}: {marker[:80]}')
              write(path, text.replace(marker, addition + marker, 1))

          def replace_once(path, old, new):
              text = read(path)
              if new in text:
                  return
              if old not in text:
                  raise RuntimeError(f'Texto não encontrado em {path}: {old[:80]}')
              write(path, text.replace(old, new, 1))

          page = '''<!DOCTYPE html>
          <html lang="pt-BR" data-editorial-system="vaelora">
