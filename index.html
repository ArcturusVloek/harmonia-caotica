<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Harmonia Caótica</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;

      background:
        radial-gradient(circle at top, #30253c 0%, #15121b 45%, #09080c 100%);

      color: #eee8df;
      font-family: Georgia, "Times New Roman", serif;
      text-align: center;
    }

    main {
      width: 100%;
      max-width: 720px;
      padding: 54px 28px;

      border: 1px solid rgba(211, 177, 105, 0.55);
      border-radius: 16px;

      background: rgba(10, 9, 14, 0.78);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
    }

    .ornamento {
      color: #d3b169;
      font-size: 22px;
      letter-spacing: 12px;
    }

    h1 {
      margin: 24px 0 10px;

      color: #e6c780;
      font-size: clamp(38px, 10vw, 72px);
      font-weight: normal;
      line-height: 0.95;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    h2 {
      margin: 0 0 32px;

      color: #bcb3c7;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: normal;
      letter-spacing: 2px;
    }

    p {
      max-width: 560px;
      margin: 0 auto;

      color: #d7d0c8;
      font-size: 18px;
      line-height: 1.7;
    }

    .mundo {
      color: #e6c780;
    }

    footer {
      margin-top: 42px;
      color: #918899;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <main>
    <div class="ornamento">◆ ◆ ◆</div>

    <h1>Harmonia<br>Caótica</h1>

    <h2>Um RPG ambientado no mundo de Vaelora</h2>

    <p>
      Deuses governam conceitos, religiões moldam territórios
      e mortais caminham em direção à ascensão.
      Este será o arquivo oficial de
      <span class="mundo">Vaelora</span>.
    </p>

    <footer>Site em construção</footer>
  </main>
</body>
</html>
